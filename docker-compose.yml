version: "3.3"

services:
  game-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moral-agent-game
    ports:
      - "8002:8002"
    environment:
      - HOST=0.0.0.0
      - PORT=8002
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
    command: ["python", "server_game.py"]
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:15.14
    container_name: moral-agent-postgres
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_DB=person_ai
      - POSTGRES_USER=person_ai_admin
      - POSTGRES_PASSWORD=1234
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres-data:
