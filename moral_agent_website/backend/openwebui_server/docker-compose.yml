version: "3.8"

services:
  # Backend API (Moral Agent)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      - PORT=8001
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Open WebUI Frontend
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    ports:
      - "3000:8080"
    environment:
      - OPENAI_API_BASE_URL=http://backend:8001/v1
      - OPENAI_API_KEY=sk-dummy
      - WEBUI_AUTH=false
      - ENABLE_SIGNUP=false
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - backend

volumes:
  open-webui-data:
